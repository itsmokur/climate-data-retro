<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";
  import {
    getDatabase, ref, set, update, onValue, serverTimestamp, onDisconnect, get
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDaQWhQ6s0dZYxMjbmBBsdZ5fLjSqC_qQY",
    authDomain: "climate-data-retro.firebaseapp.com",
    databaseURL: "https://climate-data-retro-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "climate-data-retro",
    storageBucket: "climate-data-retro.firebasestorage.app",
    messagingSenderId: "938718488174",
    appId: "1:938718488174:web:d73ca62395e302c900e87f",
    measurementId: "G-WM0NN6VJCF"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  try { if (await analyticsSupported()) getAnalytics(app); } catch (_) {}

  // ============================================================
  // STATE
  // ============================================================
  const COLUMNS = [
    { id: 'hifi',       title: '🙌 Hi Five',    dotColor: '#22c55e' },
    { id: 'complaints', title: '😬 Complaints', dotColor: '#ef4444' },
    { id: 'ideas',      title: '💡 Ideas',      dotColor: '#6366f1' },
    { id: 'shoutouts',  title: '🏆 Shout Outs', dotColor: '#f59e0b' },
  ];

  let state = {
    cards: {},
    phase: 0,
    title: 'Sprint Retrospective #1',
    discussed: {},
    activeDiscuss: null
  };

  let currentUser = '';
  let boardId = '';
  let addingTo = null;

  // Refs
  let boardStateRef = null;   // /boards/{boardId}/state
  let timerRef = null;        // /boards/{boardId}/timer
  let metaRef = null;         // /boards/{boardId}/meta
  let presenceMeRef = null;   // /presence/{boardId}/{clientId}
  let presenceListRef = null; // /presence/{boardId}

  const clientId = (crypto?.randomUUID?.() || (Date.now() + '_' + Math.random().toString(36).slice(2, 10)));
  let hostClientId = null;
  const isHost = () => hostClientId && hostClientId === clientId;

  // ============================================================
  // UI helpers
  // ============================================================
  function setSyncStatus(mode) {
    const dot = document.getElementById('syncDot');
    const label = document.getElementById('syncLabel');
    if (!dot || !label) return;
    if (mode === 'syncing') { dot.classList.add('syncing'); label.textContent = 'Syncing…'; }
    else if (mode === 'offline') { dot.classList.add('syncing'); label.textContent = 'Offline'; }
    else { dot.classList.remove('syncing'); label.textContent = 'Live'; }
  }

  function toast(msg, duration = 2500) {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => el.remove(), duration);
  }
  window.toast = toast;

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ============================================================
  // BOARD ID
  // ============================================================
  function initBoardId() {
    if (window.location.hash && window.location.hash.length > 2) boardId = window.location.hash.slice(1);
    else {
      boardId = Math.random().toString(36).slice(2, 10);
      window.location.hash = boardId;
    }

    boardStateRef   = ref(db, `boards/${boardId}/state`);
    timerRef        = ref(db, `boards/${boardId}/timer`);
    metaRef         = ref(db, `boards/${boardId}/meta`);
    presenceMeRef   = ref(db, `presence/${boardId}/${clientId}`);
    presenceListRef = ref(db, `presence/${boardId}`);
  }

  // ============================================================
  // META / HOST (first joiner becomes host)
  // ============================================================
  async function initMetaHost() {
    try {
      const snap = await get(metaRef);
      if (!snap.exists()) {
        await set(metaRef, { hostClientId: clientId, hostName: currentUser, createdAt: serverTimestamp() });
        hostClientId = clientId;
      } else {
        const m = snap.val() || {};
        hostClientId = m.hostClientId || null;
      }

      // keep updated
      onValue(metaRef, (s) => {
        const m = s.val() || {};
        hostClientId = m.hostClientId || null;
      });
    } catch (e) {
      console.error(e);
      // not fatal
    }
  }

  // ============================================================
  // PRESENCE
  // ============================================================
  function initPresence() {
    set(presenceMeRef, { name: currentUser, online: true, joinedAt: serverTimestamp(), clientId });
    onDisconnect(presenceMeRef).remove();

    onValue(presenceListRef, (snap) => {
      const val = snap.val() || {};
      const users = Object.values(val).filter(u => u && u.online);
      const label = document.getElementById('presenceLabel');
      if (label) {
        label.textContent = `${users.length} online`;
        const names = users.map(u => u.name).filter(Boolean);
        label.title = names.length ? names.join(', ') : '';
      }
    });
  }

  // ============================================================
  // BOARD STATE SYNC
  // ============================================================
  function subscribeBoardState() {
    setSyncStatus('syncing');
    onValue(boardStateRef, async (snap) => {
      if (snap.exists()) state = snap.val() || state;
      else await set(boardStateRef, state);

      setSyncStatus('live');
      render();
    }, (err) => {
      console.error(err);
      setSyncStatus('offline');
      toast('RTDB state subscribe error (rules?)', 5000);
    });
  }

  let saveDebounce = null;
  function saveState(immediate = true) {
    if (!boardStateRef) return;
    setSyncStatus('syncing');

    if (!immediate) {
      clearTimeout(saveDebounce);
      saveDebounce = setTimeout(() => saveState(true), 250);
      return;
    }

    set(boardStateRef, state)
      .then(() => setSyncStatus('live'))
      .catch((e) => {
        console.error(e);
        setSyncStatus('offline');
        toast('State save failed (rules / connection).', 4000);
      });
  }

  // ============================================================
  // SHARED TIMER + HIDE CARDS UNTIL END
  // ============================================================
  let timerModel = {
    durationSec: 5 * 60,
    running: false,
    endsAtMs: null,
    remainingSec: 5 * 60
  };

  function subscribeTimer() {
    onValue(timerRef, async (snap) => {
      if (snap.exists()) timerModel = snap.val() || timerModel;
      else await set(timerRef, timerModel);
      updateTimerDisplayFromModel();
      render(); // re-render to flip hidden/visible
    }, (err) => {
      console.error(err);
      toast('RTDB timer subscribe error (rules?)', 5000);
    });
  }

  function nowMs() { return Date.now(); }

  function computeRemainingSec() {
    if (timerModel.running && timerModel.endsAtMs) {
      const diff = Math.max(0, timerModel.endsAtMs - nowMs());
      return Math.ceil(diff / 1000);
    }
    return Math.max(0, timerModel.remainingSec ?? timerModel.durationSec ?? 0);
  }

  function timerEverStarted() {
    const dur = timerModel.durationSec ?? (5 * 60);
    const rem = timerModel.remainingSec ?? dur;
    return timerModel.running || !!timerModel.endsAtMs || rem !== dur;
  }

  function cardsHiddenNow() {
    // Rule:
    // - if timer never started => NOT hidden (so people can see while setting up)
    // - once timer started => hidden until remaining hits 0
    if (!timerEverStarted()) return false;
    return computeRemainingSec() > 0;
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function updateTimerDisplayFromModel() {
    const remaining = computeRemainingSec();
    const el = document.getElementById('timerDisplay');
    const btn = document.getElementById('timerStartBtn');
    if (!el) return;

    el.textContent = formatTime(remaining);
    el.classList.toggle('warning', remaining <= 30 && timerModel.running);

    if (btn) {
      btn.textContent = timerModel.running ? '⏸' : '▶';
      btn.classList.toggle('running', timerModel.running);
    }

    if (timerModel.running && remaining <= 0) {
      update(timerRef, { running: false, remainingSec: 0, endsAtMs: null }).catch(() => {});
      toast('⏰ Time is up!', 4000);
    }
  }

  // UI refresh ticker
  setInterval(() => {
    if (timerRef) {
      const before = cardsHiddenNow();
      updateTimerDisplayFromModel();
      const after = cardsHiddenNow();
      if (before !== after) render();
    }
  }, 1000);

  window.setTimer = function setTimer(minutes) {
    const dur = Math.max(1, minutes) * 60;
    update(timerRef, { durationSec: dur, running: false, remainingSec: dur, endsAtMs: null }).catch(console.error);
  };

  window.toggleTimer = function toggleTimer() {
    if (!timerModel.running) startSharedTimer();
    else pauseSharedTimer();
  };

  function startSharedTimer() {
    const remaining = computeRemainingSec();
    const endsAt = nowMs() + remaining * 1000;
    update(timerRef, { running: true, endsAtMs: endsAt, remainingSec: remaining }).catch(console.error);
  }

  function pauseSharedTimer() {
    const remaining = computeRemainingSec();
    update(timerRef, { running: false, endsAtMs: null, remainingSec: remaining }).catch(console.error);
  }

  window.resetTimer = function resetTimer() {
    const dur = timerModel.durationSec ?? (5 * 60);
    update(timerRef, { running: false, remainingSec: dur, endsAtMs: null }).catch(console.error);
  };

  // ============================================================
  // JOIN
  // ============================================================
  window.joinBoard = async function joinBoard() {
    const name = document.getElementById('welcomeNameInput').value.trim();
    if (!name) return;

    currentUser = name;
    document.getElementById('userAvatarEl').textContent = name[0].toUpperCase();
    document.getElementById('welcomeModal').style.display = 'none';

    initPresence();
    await initMetaHost();     // enables host delete
    subscribeBoardState();
    subscribeTimer();
    render();
  };

  // ============================================================
  // RENDER
  // ============================================================
  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    if (state.phase === 2) renderDiscussView(board);
    else renderBoardView(board);

    document.querySelectorAll('.phase-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === state.phase);
    });

    document.getElementById('retroTitle').value = state.title || '';
  }

  function renderBoardView(board) {
    const hidden = cardsHiddenNow();
    board.style.display = 'grid';
    board.style.gridTemplateColumns = 'repeat(4, 1fr)';

    COLUMNS.forEach(col => {
      const cards = Object.values(state.cards || {}).filter(c => c.col === col.id)
        .sort((a, b) => (b.ts || 0) - (a.ts || 0));

      const colEl = document.createElement('div');
      colEl.className = 'column';
      colEl.dataset.col = col.id;

      // Drag-drop only when visible
      if (!hidden) {
        colEl.addEventListener('dragover', e => { e.preventDefault(); colEl.querySelector('.column-body').classList.add('drag-over'); });
        colEl.addEventListener('dragleave', () => { colEl.querySelector('.column-body').classList.remove('drag-over'); });
        colEl.addEventListener('drop', e => {
          e.preventDefault();
          colEl.querySelector('.column-body').classList.remove('drag-over');
          const cardId = e.dataTransfer.getData('cardId');
          if (cardId && state.cards[cardId]) {
            state.cards[cardId].col = col.id;
            saveState(true);
            render();
          }
        });
      }

      const hiddenMsg = hidden
        ? `<div class="empty-card">🔒 Cards are hidden until the timer ends.</div>`
        : '';

      colEl.innerHTML = `
        <div class="column-header">
          <div class="col-dot" style="background:${col.dotColor}"></div>
          <div class="col-title">${col.title}</div>
          <div class="col-count">${cards.length}</div>
        </div>
        <div class="column-body" id="body-${col.id}">
          ${hidden ? hiddenMsg : (cards.length === 0 ? `<div class="empty-card">No cards yet.<br>Add the first one! 👇</div>` : '')}
          ${cards.map((c, i) => renderCard(c, i, hidden)).join('')}
          <div class="add-card-area" id="addArea-${col.id}" style="display:${addingTo===col.id?'flex':'none'};flex-direction:column;gap:8px">
            <textarea class="add-card-textarea" id="textarea-${col.id}" placeholder="Share your thoughts..." rows="3"></textarea>
            <div class="add-card-actions">
              <button class="btn-ghost" onclick="cancelAdd('${col.id}')">Cancel</button>
              <button class="btn-primary" onclick="addCard('${col.id}')">Add</button>
            </div>
          </div>
          <button class="add-card-trigger" onclick="showAdd('${col.id}')">
            <span style="font-size:16px">+</span> Add card
          </button>
        </div>
      `;

      board.appendChild(colEl);
    });

    // Drag handlers (only when visible)
    if (!hidden) {
      document.querySelectorAll('.card[draggable="true"]').forEach(el => {
        el.addEventListener('dragstart', e => {
          e.dataTransfer.setData('cardId', el.dataset.id);
          el.classList.add('dragging');
        });
        el.addEventListener('dragend', () => el.classList.remove('dragging'));
      });
    }
  }

  function renderDiscussView(board) {
    const hidden = cardsHiddenNow();

    board.style.display = 'block';

    const allCards = Object.values(state.cards || {})
      .sort((a, b) => (b.votes?.length || 0) - (a.votes?.length || 0));

    const discussed = state.discussed || {};
    const doneCount = Object.keys(discussed).filter(id => discussed[id] && state.cards[id]).length;
    const totalCount = allCards.length;
    const pct = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;

    let sidebarItems = '';
    COLUMNS.forEach(col => {
      const colCards = allCards.filter(c => c.col === col.id);
      if (colCards.length === 0) return;
      sidebarItems += `<div class="discuss-section-label">${col.title}</div>`;
      colCards.forEach((c) => {
        const votes = c.votes?.length || 0;
        const done = discussed[c.id];
        const isActive = state.activeDiscuss === c.id;
        const globalRank = allCards.indexOf(c);
        sidebarItems += `
          <div class="discuss-item ${done ? 'done' : ''} ${isActive ? 'active' : ''}" onclick="setActiveDiscuss('${c.id}')">
            <div class="discuss-rank-num ${globalRank === 0 ? 'top' : ''}">${globalRank + 1}</div>
            <div class="discuss-item-body">
              <div class="discuss-item-text">${hidden ? '🔒 Hidden until timer ends' : escHtml(c.text)}</div>
              <div class="discuss-item-meta">
                ${!hidden && votes > 0 ? `<span class="discuss-vote-pill">❤️ ${votes}</span>` : ''}
              </div>
            </div>
            <div class="discuss-check" onclick="event.stopPropagation();toggleDiscussed('${c.id}')">${done ? '✓' : ''}</div>
          </div>`;
      });
    });

    let boardColsHtml = '';
    COLUMNS.forEach(col => {
      const cards = allCards.filter(c => c.col === col.id);
      boardColsHtml += `
        <div class="column">
          <div class="column-header">
            <div class="col-dot" style="background:${col.dotColor}"></div>
            <div class="col-title">${col.title}</div>
            <div class="col-count">${cards.length}</div>
          </div>
          <div class="column-body">
            ${cards.length === 0 ? `<div class="empty-card">No cards</div>` : ''}
            ${cards.map((c, i) => renderCard(c, i, hidden)).join('')}
          </div>
        </div>`;
    });

    board.innerHTML = `
      <div class="discuss-layout">
        <div class="discuss-sidebar">
          <div class="discuss-sidebar-header">
            <h3>💬 Discussion Queue</h3>
            <span class="discuss-progress">${doneCount}/${totalCount}</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="discuss-list">${sidebarItems || '<div style="padding:16px;font-size:12px;color:var(--muted)">No cards to discuss yet.</div>'}</div>
        </div>
        <div class="discuss-board">${boardColsHtml}</div>
      </div>`;

    if (state.activeDiscuss) {
      const activeEl = board.querySelector(`.card[data-id="${state.activeDiscuss}"]`);
      if (activeEl) {
        activeEl.style.boxShadow = '0 0 0 2px var(--accent), 0 4px 16px rgba(0,0,0,0.12)';
        activeEl.style.transform = 'translateY(-2px)';
      }
    }
  }

  function renderCard(c, rank, hidden) {
    const myVote = c.votes && c.votes.includes(currentUser);
    const voteCount = c.votes ? c.votes.length : 0;
    const owner = c.author === currentUser;

    // Delete permission:
    // - owner can delete own card anytime
    // - host can delete any card anytime
    const canDelete = owner || isHost();

    const showRank = !hidden && state.phase === 2 && voteCount > 0;
    const isTop = showRank && rank === 0;

    const cardBody = hidden
      ? `<div class="card-text" style="color:var(--muted)">🔒 Hidden until the timer ends</div>`
      : `<div class="card-text">${escHtml(c.text)}</div>`;

    const voteBtn = (!hidden && state.phase >= 1)
      ? `<button class="vote-btn ${myVote?'voted':''}" onclick="toggleVote('${c.id}')">${myVote?'❤️':'🤍'} ${voteCount}</button>`
      : '';

    const delBtn = canDelete
      ? `<div class="card-actions">
          <button class="card-action-btn" title="Delete" onclick="deleteCard('${c.id}')">✕</button>
        </div>`
      : '';

    return `<div class="card" draggable="${hidden ? 'false' : 'true'}" data-id="${c.id}">
      ${showRank ? `<div style="margin-bottom:6px"><span class="rank-badge ${isTop?'top':''}">${isTop?'🥇':''} ${voteCount} vote${voteCount !== 1 ? 's' : ''}</span></div>` : ''}
      ${cardBody}
      <div class="card-footer">
        <span></span>
        <div style="display:flex;gap:4px;align-items:center">
          ${voteBtn}
          ${delBtn}
        </div>
      </div>
    </div>`;
  }

  // ============================================================
  // ACTIONS
  // ============================================================
  window.showAdd = function showAdd(colId) {
    addingTo = colId;
    render();
    setTimeout(() => {
      const ta = document.getElementById('textarea-' + colId);
      if (ta) ta.focus();
    }, 50);
  };

  window.cancelAdd = function cancelAdd() {
    addingTo = null;
    render();
  };

  window.addCard = function addCard(colId) {
    const ta = document.getElementById('textarea-' + colId);
    if (!ta) return;
    const text = ta.value.trim();
    if (!text) return;

    const id = Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    state.cards = state.cards || {};
    state.cards[id] = { id, text, author: currentUser, col: colId, votes: [], ts: Date.now() };

    saveState(true);
    addingTo = null;
    render();
    toast('Card added!');
  };

  window.deleteCard = function deleteCard(id) {
    if (!state.cards || !state.cards[id]) return;

    const owner = state.cards[id].author === currentUser;
    if (!(owner || isHost())) {
      toast('You can only delete your own cards (unless you are the host).', 3000);
      return;
    }

    if (!confirm('Delete this card?')) return;

    delete state.cards[id];
    saveState(true);
    render();
  };

  window.toggleVote = function toggleVote(id) {
    if (!state.cards || !state.cards[id]) return;

    // If cards hidden, ignore votes
    if (cardsHiddenNow()) return;

    const votes = state.cards[id].votes || [];
    const idx = votes.indexOf(currentUser);
    if (idx === -1) votes.push(currentUser);
    else votes.splice(idx, 1);
    state.cards[id].votes = votes;

    saveState(true);
    render();
  };

  window.toggleDiscussed = function toggleDiscussed(id) {
    state.discussed = state.discussed || {};
    state.discussed[id] = !state.discussed[id];
    saveState(true);
    render();
  };

  window.setActiveDiscuss = function setActiveDiscuss(id) {
    state.activeDiscuss = state.activeDiscuss === id ? null : id;
    saveState(true);
    render();
    setTimeout(() => {
      const el = document.querySelector(`.card[data-id="${id}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  };

  window.setPhase = function setPhase(p) {
    state.phase = p;
    saveState(true);
    render();
    const labels = ['Reflect phase', 'Voting phase', 'Discussion phase'];
    const el = document.getElementById('timerPhaseLabel');
    if (el) el.textContent = labels[p];
    toast('Phase: ' + ['Reflect', 'Vote', 'Discuss'][p]);
  };

  // Title
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('retroTitle').addEventListener('input', e => {
      state.title = e.target.value;
      saveState(false);
    });
  });

  // Share
  window.openShare = function openShare() {
    document.getElementById('shareUrlDisplay').textContent = window.location.href;
    document.getElementById('shareModal').style.display = 'flex';
  };
  window.closeShare = function closeShare() {
    document.getElementById('shareModal').style.display = 'none';
  };
  window.copyShareUrl = async function copyShareUrl() {
    await navigator.clipboard.writeText(window.location.href);
    toast('Link copied! 🎉');
    closeShare();
  };

  // INIT
  initBoardId();
  setSyncStatus('live');
</script>
