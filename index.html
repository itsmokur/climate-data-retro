<!-- Firebase (Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
  // ============================================================
  // FIREBASE CONFIG
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyDaQWhQ6s0dZYxMjbmBBsdZ5fLjSqC_qQY",
    authDomain: "climate-data-retro.firebaseapp.com",
    databaseURL: "https://climate-data-retro-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "climate-data-retro",
    storageBucket: "climate-data-retro.firebasestorage.app",
    messagingSenderId: "938718488174",
    appId: "1:938718488174:web:d73ca62395e302c900e87f",
    measurementId: "G-WM0NN6VJCF"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ============================================================
  // CONSTANTS / STATE
  // ============================================================
  const COLUMNS = [
    { id: 'hifi',       title: '🙌 Hi Five',    dotColor: '#22c55e' },
    { id: 'complaints', title: '😬 Complaints', dotColor: '#ef4444' },
    { id: 'ideas',      title: '💡 Ideas',      dotColor: '#6366f1' },
    { id: 'shoutouts',  title: '🏆 Shout Outs', dotColor: '#f59e0b' },
  ];

  let state = {
    cards: {},
    phase: 0,
    title: 'Sprint Retrospective #1',
    discussed: {},
    activeDiscuss: null
  };

  let currentUser = '';
  let boardId = '';
  let addingTo = null;

  const clientId = (crypto?.randomUUID?.() || (Date.now() + '_' + Math.random().toString(36).slice(2, 10)));
  let hostClientId = null;
  const isHost = () => hostClientId && hostClientId === clientId;

  // Refs
  let boardStateRef, timerRef, metaRef, presenceMeRef, presenceListRef, connectedRef;

  // Timer model (shared)
  let timerModel = {
    durationSec: 5 * 60,
    running: false,
    endsAtMs: null,
    remainingSec: 5 * 60
  };

  // ============================================================
  // HELPERS
  // ============================================================
  function $(id){ return document.getElementById(id); }

  function toast(msg, duration = 2500) {
    const container = $('toastContainer');
    if (!container) return;
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => el.remove(), duration);
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function setSyncStatus(mode) {
    const dot = $('syncDot');
    const label = $('syncLabel');
    if (!dot || !label) return;
    if (mode === 'syncing') { dot.classList.add('syncing'); label.textContent = 'Syncing…'; }
    else if (mode === 'offline') { dot.classList.add('syncing'); label.textContent = 'Offline'; }
    else { dot.classList.remove('syncing'); label.textContent = 'Live'; }
  }

  function nowMs(){ return Date.now(); }

  function computeRemainingSec() {
    if (timerModel.running && timerModel.endsAtMs) {
      const diff = Math.max(0, timerModel.endsAtMs - nowMs());
      return Math.ceil(diff / 1000);
    }
    return Math.max(0, timerModel.remainingSec ?? timerModel.durationSec ?? 0);
  }

  function timerEverStarted() {
    const dur = timerModel.durationSec ?? (5 * 60);
    const rem = timerModel.remainingSec ?? dur;
    return timerModel.running || !!timerModel.endsAtMs || rem !== dur;
  }

  function cardsHiddenNow() {
    if (!timerEverStarted()) return false; // timer hiç başlamadıysa gizleme yok
    return computeRemainingSec() > 0;      // başladıysa süre bitene kadar gizle
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function updateTimerDisplayFromModel() {
    const remaining = computeRemainingSec();
    const el = $('timerDisplay');
    const btn = $('timerStartBtn');
    if (!el) return;

    el.textContent = formatTime(remaining);
    el.classList.toggle('warning', remaining <= 30 && timerModel.running);

    if (btn) {
      btn.textContent = timerModel.running ? '⏸' : '▶';
      btn.classList.toggle('running', timerModel.running);
    }

    if (timerModel.running && remaining <= 0) {
      timerRef.update({ running: false, remainingSec: 0, endsAtMs: null }).catch(()=>{});
      toast('⏰ Time is up!', 4000);
    }
  }

  // UI refresh ticker
  setInterval(() => {
    if (!timerRef) return;
    const before = cardsHiddenNow();
    updateTimerDisplayFromModel();
    const after = cardsHiddenNow();
    if (before !== after) render();
  }, 1000);

  // ============================================================
  // INIT BOARD ID + REFS
  // ============================================================
  function initBoardId() {
    if (window.location.hash && window.location.hash.length > 2) boardId = window.location.hash.slice(1);
    else {
      boardId = Math.random().toString(36).slice(2, 10);
      window.location.hash = boardId;
    }

    boardStateRef   = db.ref(`boards/${boardId}/state`);
    timerRef        = db.ref(`boards/${boardId}/timer`);
    metaRef         = db.ref(`boards/${boardId}/meta`);
    presenceMeRef   = db.ref(`presence/${boardId}/${clientId}`);
    presenceListRef = db.ref(`presence/${boardId}`);
    connectedRef    = db.ref(".info/connected");
  }

  // ============================================================
  // HOST (first joiner)
  // ============================================================
  async function initMetaHost() {
    try {
      const snap = await metaRef.get();
      if (!snap.exists()) {
        await metaRef.set({ hostClientId: clientId, hostName: currentUser, createdAt: firebase.database.ServerValue.TIMESTAMP });
        hostClientId = clientId;
      } else {
        hostClientId = (snap.val() || {}).hostClientId || null;
      }
      metaRef.on('value', (s) => {
        hostClientId = (s.val() || {}).hostClientId || null;
        render(); // host değişirse delete butonları güncellensin
      });
    } catch (e) {
      console.error(e);
    }
  }

  // ============================================================
  // PRESENCE (stable)
  // ============================================================
  function initPresence() {
    connectedRef.on('value', (snap) => {
      if (snap.val() !== true) return;

      presenceMeRef.onDisconnect().remove();
      presenceMeRef.set({
        name: currentUser,
        online: true,
        clientId,
        joinedAt: firebase.database.ServerValue.TIMESTAMP
      });
    });

    presenceListRef.on('value', (snap) => {
      const val = snap.val() || {};
      const users = Object.values(val).filter(u => u && u.online);
      const label = $('presenceLabel');
      if (label) {
        label.textContent = `${users.length} online`;
        label.title = users.map(u => u.name).filter(Boolean).join(', ');
      }
    });
  }

  // ============================================================
  // BOARD STATE SYNC
  // ============================================================
  function subscribeBoardState() {
    setSyncStatus('syncing');
    boardStateRef.on('value', async (snap) => {
      if (snap.exists()) state = snap.val() || state;
      else await boardStateRef.set(state);

      setSyncStatus('live');
      render();
    }, (err) => {
      console.error(err);
      setSyncStatus('offline');
      toast('RTDB state subscribe error (rules?)', 5000);
    });
  }

  let saveDebounce = null;
  function saveState(immediate = true) {
    if (!boardStateRef) return;
    setSyncStatus('syncing');

    if (!immediate) {
      clearTimeout(saveDebounce);
      saveDebounce = setTimeout(() => saveState(true), 250);
      return;
    }

    boardStateRef.set(state)
      .then(() => setSyncStatus('live'))
      .catch((e) => {
        console.error(e);
        setSyncStatus('offline');
        toast('State save failed (rules / connection).', 4000);
      });
  }

  // ============================================================
  // TIMER SYNC
  // ============================================================
  function subscribeTimer() {
    timerRef.on('value', async (snap) => {
      if (snap.exists()) timerModel = snap.val() || timerModel;
      else await timerRef.set(timerModel);

      updateTimerDisplayFromModel();
      render();
    }, (err) => {
      console.error(err);
      toast('RTDB timer subscribe error (rules?)', 5000);
    });
  }

  window.setTimer = function(minutes) {
    const dur = Math.max(1, minutes) * 60;
    timerRef.update({ durationSec: dur, running: false, remainingSec: dur, endsAtMs: null });
  };

  window.toggleTimer = function() {
    if (!timerModel.running) startSharedTimer();
    else pauseSharedTimer();
  };

  function startSharedTimer() {
    const remaining = computeRemainingSec();
    const endsAt = nowMs() + remaining * 1000;
    timerRef.update({ running: true, endsAtMs: endsAt, remainingSec: remaining });
  }

  function pauseSharedTimer() {
    const remaining = computeRemainingSec();
    timerRef.update({ running: false, endsAtMs: null, remainingSec: remaining });
  }

  window.resetTimer = function() {
    const dur = timerModel.durationSec ?? (5 * 60);
    timerRef.update({ running: false, remainingSec: dur, endsAtMs: null });
  };

  // ============================================================
  // JOIN
  // ============================================================
  window.joinBoard = async function() {
    const name = $('welcomeNameInput')?.value?.trim();
    if (!name) return;

    currentUser = name;
    $('userAvatarEl').textContent = name[0].toUpperCase();
    $('welcomeModal').style.display = 'none';

    initPresence();
    await initMetaHost();
    subscribeBoardState();
    subscribeTimer();
    render();
  };

  // ============================================================
  // RENDER
  // ============================================================
  function render() {
    const board = $('board');
    if (!board) return;
    board.innerHTML = '';

    if (state.phase === 2) renderDiscussView(board);
    else renderBoardView(board);

    document.querySelectorAll('.phase-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === state.phase);
    });

    const titleEl = $('retroTitle');
    if (titleEl) titleEl.value = state.title || '';
  }

  function renderBoardView(board) {
    const hidden = cardsHiddenNow();
    board.style.display = 'grid';
    board.style.gridTemplateColumns = 'repeat(4, 1fr)';

    COLUMNS.forEach(col => {
      const cards = Object.values(state.cards || {}).filter(c => c.col === col.id)
        .sort((a, b) => (b.ts || 0) - (a.ts || 0));

      const colEl = document.createElement('div');
      colEl.className = 'column';

      if (!hidden) {
        colEl.addEventListener('dragover', e => { e.preventDefault(); colEl.querySelector('.column-body').classList.add('drag-over'); });
        colEl.addEventListener('dragleave', () => { colEl.querySelector('.column-body').classList.remove('drag-over'); });
        colEl.addEventListener('drop', e => {
          e.preventDefault();
          colEl.querySelector('.column-body').classList.remove('drag-over');
          const cardId = e.dataTransfer.getData('cardId');
          if (cardId && state.cards[cardId]) {
            state.cards[cardId].col = col.id;
            saveState(true);
            render();
          }
        });
      }

      const hiddenMsg = hidden
        ? `<div class="empty-card">🔒 Cards are hidden until the timer ends.</div>`
        : '';

      colEl.innerHTML = `
        <div class="column-header">
          <div class="col-dot" style="background:${col.dotColor}"></div>
          <div class="col-title">${col.title}</div>
          <div class="col-count">${cards.length}</div>
        </div>
        <div class="column-body">
          ${hidden ? hiddenMsg : (cards.length === 0 ? `<div class="empty-card">No cards yet.<br>Add the first one! 👇</div>` : '')}
          ${cards.map((c, i) => renderCard(c, i, hidden)).join('')}
          <div class="add-card-area" style="display:${addingTo===col.id?'flex':'none'};flex-direction:column;gap:8px">
            <textarea class="add-card-textarea" id="textarea-${col.id}" placeholder="Share your thoughts..." rows="3"></textarea>
            <div class="add-card-actions">
              <button class="btn-ghost" onclick="cancelAdd('${col.id}')">Cancel</button>
              <button class="btn-primary" onclick="addCard('${col.id}')">Add</button>
            </div>
          </div>
          <button class="add-card-trigger" onclick="showAdd('${col.id}')">
            <span style="font-size:16px">+</span> Add card
          </button>
        </div>
      `;
      board.appendChild(colEl);
    });

    if (!hidden) {
      document.querySelectorAll('.card[draggable="true"]').forEach(el => {
        el.addEventListener('dragstart', e => {
          e.dataTransfer.setData('cardId', el.dataset.id);
          el.classList.add('dragging');
        });
        el.addEventListener('dragend', () => el.classList.remove('dragging'));
      });
    }
  }

  function renderDiscussView(board) {
    const hidden = cardsHiddenNow();
    board.style.display = 'grid';
    board.style.gridTemplateColumns = 'repeat(4, 1fr)';
    // Simplified: show columns same as board view in discuss too
    renderBoardView(board);
  }

  function renderCard(c, rank, hidden) {
    const myVote = c.votes && c.votes.includes(currentUser);
    const voteCount = c.votes ? c.votes.length : 0;
    const owner = c.author === currentUser;
    const canDelete = owner || isHost();

    const cardBody = hidden
      ? `<div class="card-text" style="color:var(--muted)">🔒 Hidden until the timer ends</div>`
      : `<div class="card-text">${escHtml(c.text)}</div>`;

    const voteBtn = (!hidden && state.phase >= 1)
      ? `<button class="vote-btn ${myVote?'voted':''}" onclick="toggleVote('${c.id}')">${myVote?'❤️':'🤍'} ${voteCount}</button>`
      : '';

    const delBtn = canDelete
      ? `<div class="card-actions"><button class="card-action-btn" title="Delete" onclick="deleteCard('${c.id}')">✕</button></div>`
      : '';

    return `<div class="card" draggable="${hidden ? 'false' : 'true'}" data-id="${c.id}">
      ${cardBody}
      <div class="card-footer">
        <span></span>
        <div style="display:flex;gap:4px;align-items:center">
          ${voteBtn}
          ${delBtn}
        </div>
      </div>
    </div>`;
  }

  // ============================================================
  // ACTIONS
  // ============================================================
  window.showAdd = function(colId) {
    addingTo = colId;
    render();
    setTimeout(() => {
      const ta = document.getElementById('textarea-' + colId);
      if (ta) ta.focus();
    }, 50);
  };

  window.cancelAdd = function() {
    addingTo = null;
    render();
  };

  window.addCard = function(colId) {
    const ta = document.getElementById('textarea-' + colId);
    if (!ta) return;
    const text = ta.value.trim();
    if (!text) return;

    const id = Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    state.cards = state.cards || {};
    state.cards[id] = { id, text, author: currentUser, col: colId, votes: [], ts: Date.now() };
    saveState(true);
    addingTo = null;
    render();
    toast('Card added!');
  };

  window.deleteCard = function(id) {
    if (!state.cards || !state.cards[id]) return;
    const owner = state.cards[id].author === currentUser;
    if (!(owner || isHost())) {
      toast('You can only delete your own cards (unless you are the host).', 3000);
      return;
    }
    if (!confirm('Delete this card?')) return;

    delete state.cards[id];
    saveState(true);
    render();
  };

  window.toggleVote = function(id) {
    if (!state.cards || !state.cards[id]) return;
    if (cardsHiddenNow()) return; // hidden iken vote yok

    const votes = state.cards[id].votes || [];
    const idx = votes.indexOf(currentUser);
    if (idx === -1) votes.push(currentUser);
    else votes.splice(idx, 1);
    state.cards[id].votes = votes;
    saveState(true);
    render();
  };

  window.setPhase = function(p) {
    state.phase = p;
    saveState(true);
    render();
    const labels = ['Reflect phase', 'Voting phase', 'Discussion phase'];
    const el = document.getElementById('timerPhaseLabel');
    if (el) el.textContent = labels[p];
  };

  // Title binding
  document.addEventListener('DOMContentLoaded', () => {
    const titleEl = $('retroTitle');
    if (titleEl) {
      titleEl.addEventListener('input', e => {
        state.title = e.target.value;
        saveState(false);
      });
    }
  });

  // Share
  window.openShare = function() {
    document.getElementById('shareUrlDisplay').textContent = window.location.href;
    document.getElementById('shareModal').style.display = 'flex';
  };
  window.closeShare = function() {
    document.getElementById('shareModal').style.display = 'none';
  };
  window.copyShareUrl = async function() {
    await navigator.clipboard.writeText(window.location.href);
    toast('Link copied! 🎉');
    closeShare();
  };

  // INIT
  initBoardId();
  setSyncStatus('live');
</script>
